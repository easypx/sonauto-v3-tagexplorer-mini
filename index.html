<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonauto V3 Tag-Auswahl</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background-color: #f4f6f9;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .control-group {
            flex: 1;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }

        select {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background-color: #fff;
        }

        /* Flexbox für die platzsparende Anzeige nebeneinander */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .tag-item {
            padding: 6px 14px;
            background: #eef2f7;
            color: #2c3e50;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #dce4ec;
            transition: all 0.2s ease;
        }

        .tag-item:hover {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }

        .headline {
            display: block;
            font-size: 32px;
            padding: 20px;
            color: #007bff;

            /* Neu hinzugefügt für die Zentrierung */
            text-align: center;
        }

        .footer {
            display: block;
            font-size: 12px;
            padding: 20px;
            color: #007bff;

            /* Neu hinzugefügt für die Zentrierung */
            text-align: center;
        }

        .tag-counter {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="headline">
            Sonauto v3 Tag Explorer mini <span class="tag-counter">(<span id="totalTags" >0</span> total tags)</span> 
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="categorySelect">Filter category:</label>
                <select id="categorySelect" onchange="renderTags()">
                    <!-- Wird dynamisch befüllt -->
                </select>
            </div>

            <div class="control-group">
                <label for="sortSelect">Sorting:</label>
                <select id="sortSelect" onchange="renderTags()">
                    <option value="original">Original order</option>
                    <option value="asc">Alphabetical (A - Z)</option>
                    <option value="desc">Alphabetical (Z - A)</option>
                </select>
            </div>
        </div>

        <h3>Available Tags: <span class="tag-counter">(<span id="tagCounter" >0</span>)</span></h3>

        <ul id="tagList" class="tag-container">
            <!-- Tags werden hier flexibel eingefügt -->
        </ul>
        <div class="footer">
            Made with ❤️ by Klangraum (🇩🇪 20260607)
        </div>
    </div>

        function init() {
            const select = document.getElementById("categorySelect");

            // Neu: Set erstellen, um einzigartige Tags zu sammeln
            const uniqueTags = new Set();

            for (let category in tagData) {
                let option = document.createElement("option");
                option.value = category;
                option.textContent = category;
                select.appendChild(option);

                // Neu: Alle Tags dieser Kategorie in das Set werfen
                tagData[category].forEach(tag => uniqueTags.add(tag));
            }

            // Neu: Die Gesamtanzahl im HTML anzeigen
            document.getElementById("totalTags").textContent = uniqueTags.size;

            renderTags();
        }

        function renderTags() {
            const selectedCategory = document.getElementById("categorySelect").value;
            const sortOrder = document.getElementById("sortSelect").value;
            const list = document.getElementById("tagList");
            const counter = document.getElementById("tagCounter"); // Neu: Counter-Element holen

            list.innerHTML = "";

            // Kopie des Arrays ziehen, um das Original-JSON nicht zu verändern
            let tags = [...tagData[selectedCategory]];

            // Neu: Die Anzahl der Tags ermitteln und anzeigen
            counter.textContent = `Found ${tags.length} tags`;

            // Sortierung anwenden
            if (sortOrder === "asc") {
                tags.sort((a, b) => a.localeCompare(b, 'de', { sensitivity: 'base' }));
            } else if (sortOrder === "desc") {
                tags.sort((a, b) => b.localeCompare(a, 'de', { sensitivity: 'base' }));
            }

            // Tags als "Badges" rendern
            tags.forEach(tag => {
                let li = document.createElement("li");
                li.className = "tag-item";
                li.textContent = tag;
                list.appendChild(li);
            });
        }

        window.onload = init;
    </script>
